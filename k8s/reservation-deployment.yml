apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-service
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservation-service
  template:
    metadata:
      labels:
        app: reservation-service
    spec:
      containers:
      - name: reservation-service
        image: dalirom123/reservation-service:latest
        ports:
        - containerPort: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: reservation-service
  namespace: freelink
spec:
  type: ClusterIP
  selector:
    app: reservation-service
  ports:
    - port: 8083
      targetPort: 8083
