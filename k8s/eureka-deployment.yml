apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
                env:
            - name: JAVA_OPTS
              value: "-Xms64m -Xmx128m"
      - name: eureka-server
        image: dalirom123/eureka-server:latest
        imagePullPolicy: Always
        resources:
          resources:
            limits:
              memory: "256Mi"
            requests:
              memory: "128Mi"
        ports:
        - containerPort: 8761
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: freelink
spec:
  type: ClusterIP
  selector:
    app: eureka-server
  resources:
          resources:
            limits:
              memory: "256Mi"
            requests:
              memory: "128Mi"
        ports:
    - port: 8761
      targetPort: 8761

