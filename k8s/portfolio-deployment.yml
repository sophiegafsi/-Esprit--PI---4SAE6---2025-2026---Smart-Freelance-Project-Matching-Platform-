apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-service
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-service
  template:
    metadata:
      labels:
        app: portfolio-service
    spec:
      containers:
      - name: portfolio-service
        image: dalirom123/portfolio-service:latest
        ports:
        - containerPort: 8090
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/portfolio_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "root"
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-service
  namespace: freelink
spec:
  type: ClusterIP
  selector:
    app: portfolio-service
  ports:
    - port: 8090
      targetPort: 8090
