apiVersion: apps/v1
kind: Deployment
metadata:
  name: skills-service
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skills-service
  template:
    metadata:
      labels:
        app: skills-service
    spec:
      containers:
      - name: skills-service
        image: dalirom123/skills-service:latest
        imagePullPolicy: Always
        env:
          - name: JAVA_OPTS
            value: "-Xms64m -Xmx128m"
        resources:
          limits:
            memory: "300Mi"
          requests:
            memory: "150Mi"
        ports:
        - containerPort: 8086
---
apiVersion: v1
kind: Service
metadata:
  name: skills-service-service
  namespace: freelink
spec:
  type: ClusterIP
  selector:
    app: skills-service
  ports:
    - port: 8086
      targetPort: 8086
