apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
      - name: user
        image: dalirom123/user:latest
        ports:
        - containerPort: 8085
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: freelink
spec:
  type: ClusterIP
  selector:
    app: user
  ports:
    - port: 8085
      targetPort: 8085
