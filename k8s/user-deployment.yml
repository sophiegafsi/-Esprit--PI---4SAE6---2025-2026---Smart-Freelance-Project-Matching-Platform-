apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
      - name: user
        image: dalirom123/user:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8082
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/freelink-db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "root"
        - name: KEYCLOAK_AUTH_SERVER_URL
          value: "http://20.240.47.244:30090"
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: freelink
spec:
  type: ClusterIP
  selector:
    app: user
  ports:
    - port: 8085
      targetPort: 8085
