apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
      - name: user
        image: dalirom123/user:latest
        imagePullPolicy: Always
        env:
          - name: JAVA_OPTS
            value: "-Xms64m -Xmx256m"
        resources:
          limits:
            memory: "400Mi"
          requests:
            memory: "250Mi"
        ports:
        - containerPort: 8087
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: freelink
spec:
  type: ClusterIP
  selector:
    app: user
  ports:
    - port: 8087
      targetPort: 8087

