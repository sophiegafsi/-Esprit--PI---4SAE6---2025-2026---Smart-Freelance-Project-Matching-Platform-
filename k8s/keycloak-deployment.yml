apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
                env:
            - name: JAVA_OPTS
              value: "-Xms64m -Xmx128m"
      - name: keycloak
        image: quay.io/keycloak/keycloak:22.0.1
        env:
        - name: KEYCLOAK_ADMIN
          value: "admin"
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: "admin"
        - name: KC_DB
          value: dev-file
        command: ["/opt/keycloak/bin/kc.sh", "start-dev", "--import-realm"]
        resources:
          resources:
            limits:
              memory: "256Mi"
            requests:
              memory: "128Mi"
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: realm-config
          mountPath: /opt/keycloak/data/import/freelink-realm.json
          subPath: freelink-realm.json
      volumes:
      - name: realm-config
        configMap:
          name: keycloak-realm-config
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: freelink
spec:
  type: NodePort
  selector:
    app: keycloak
  resources:
          resources:
            limits:
              memory: "256Mi"
            requests:
              memory: "128Mi"
        ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30090

