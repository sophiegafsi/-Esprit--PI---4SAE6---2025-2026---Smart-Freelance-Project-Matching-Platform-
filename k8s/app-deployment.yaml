---
# ── Reservation App Deployment ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation-app
  namespace: reservation-ns
  labels:
    app: reservation-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reservation-app
  template:
    metadata:
      labels:
        app: reservation-app
    spec:
      containers:
        - name: reservation-app
          image: reservation-service:latest   # replaced by Jenkins with :$BUILD_NUMBER
          ports:
            - containerPort: 8088
          envFrom:
            - configMapRef:
                name: reservation-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reservation-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8088
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
# ── App Service (NodePort — accessible from WSL host) ─────────────────
apiVersion: v1
kind: Service
metadata:
  name: reservation-service
  namespace: reservation-ns
spec:
  selector:
    app: reservation-app
  type: NodePort
  ports:
    - port: 8088
      targetPort: 8088
      nodePort: 30088
