apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailhog
  template:
    metadata:
      labels:
        app: mailhog
    spec:
      containers:
                env:
            - name: JAVA_OPTS
              value: "-Xms64m -Xmx128m"
      - name: mailhog
        image: mailhog/mailhog:latest
        resources:
          resources:
            limits:
              memory: "256Mi"
            requests:
              memory: "128Mi"
        ports:
        - containerPort: 1025
        - containerPort: 8025
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: freelink
spec:
  type: NodePort
  selector:
    app: mailhog
  resources:
          resources:
            limits:
              memory: "256Mi"
            requests:
              memory: "128Mi"
        ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: web
      port: 8025
      targetPort: 8025
      nodePort: 30025

