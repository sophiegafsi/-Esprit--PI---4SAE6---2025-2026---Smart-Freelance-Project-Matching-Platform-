apiVersion: apps/v1
kind: Deployment
metadata:
  name: condature
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: condature
  template:
    metadata:
      labels:
        app: condature
    spec:
      containers:
      - name: condature
        image: dalirom123/condature:latest
        imagePullPolicy: Always
        env:
          - name: JAVA_OPTS
            value: "-Xms64m -Xmx128m"
        resources:
          limits:
            memory: "300Mi"
          requests:
            memory: "150Mi"
        ports:
        - containerPort: 8092
---
apiVersion: v1
kind: Service
metadata:
  name: condature-service
  namespace: freelink
spec:
  type: ClusterIP
  selector:
    app: condature
  ports:
    - port: 8092
      targetPort: 8092
