apiVersion: apps/v1
kind: Deployment
metadata:
  name: recompense-service
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recompense-service
  template:
    metadata:
      labels:
        app: recompense-service
    spec:
      containers:
                env:
            - name: JAVA_OPTS
              value: "-Xms64m -Xmx128m"
      - name: recompense-service
        image: dalirom123/recompense:latest
        imagePullPolicy: Always
        resources:
          resources:
            limits:
              memory: "256Mi"
            requests:
              memory: "128Mi"
        ports:
        - containerPort: 8094
---
apiVersion: v1
kind: Service
metadata:
  name: recompense-service
  namespace: freelink
spec:
  type: ClusterIP
  selector:
    app: recompense-service
  resources:
          resources:
            limits:
              memory: "256Mi"
            requests:
              memory: "128Mi"
        ports:
    - port: 8094
      targetPort: 8094

