apiVersion: apps/v1
kind: Deployment
metadata:
  name: front
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front
  template:
    metadata:
      labels:
        app: front
    spec:
      containers:
      - name: front
        image: dalirom123/front:latest
        imagePullPolicy: Always
        env:
          - name: JAVA_OPTS
            value: "-Xms64m -Xmx128m"
        resources:
          limits:
            memory: "300Mi"
          requests:
            memory: "150Mi"
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: front-service
  namespace: freelink
spec:
  type: ClusterIP
  selector:
    app: front
  ports:
    - port: 80
      targetPort: 80
