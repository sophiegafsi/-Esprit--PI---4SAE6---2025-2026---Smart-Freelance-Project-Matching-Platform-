apiVersion: apps/v1
kind: Deployment
metadata:
  name: gestion-planning
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gestion-planning
  template:
    metadata:
      labels:
        app: gestion-planning
    spec:
      containers:
      - name: gestion-planning
        image: dalirom123/gestion-planning:latest
        imagePullPolicy: Always
        env:
          - name: JAVA_OPTS
            value: "-Xms64m -Xmx256m"
        resources:
          limits:
            memory: "400Mi"
          requests:
            memory: "250Mi"
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: gestion-planning-service
  namespace: freelink
spec:
  type: ClusterIP
  selector:
    app: gestion-planning
  ports:
    - port: 8081
      targetPort: 8081

