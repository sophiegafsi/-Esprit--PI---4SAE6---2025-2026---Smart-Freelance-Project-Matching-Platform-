apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: dalirom123/api-gateway:latest
        imagePullPolicy: Always
        env:
          - name: JAVA_OPTS
            value: "-Xms64m -Xmx128m"
        resources:
          limits:
            memory: "300Mi"
          requests:
            memory: "150Mi"
        ports:
        - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: freelink
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - port: 8082
      targetPort: 8082
