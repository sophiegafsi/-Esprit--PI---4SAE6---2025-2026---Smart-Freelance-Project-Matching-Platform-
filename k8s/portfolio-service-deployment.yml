apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-service
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-service
  template:
    metadata:
      labels:
        app: portfolio-service
    spec:
      containers:
      - name: portfolio-service
        image: dalirom123/portfolio-service:latest
        imagePullPolicy: Always
        env:
          - name: JAVA_OPTS
            value: "-Xms64m -Xmx256m"
        resources:
          limits:
            memory: "400Mi"
          requests:
            memory: "250Mi"
        ports:
        - containerPort: 8088
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-service-service
  namespace: freelink
spec:
  type: ClusterIP
  selector:
    app: portfolio-service
  ports:
    - port: 8088
      targetPort: 8088

