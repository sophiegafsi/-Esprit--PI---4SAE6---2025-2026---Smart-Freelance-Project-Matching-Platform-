apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: freelink
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evaluation-service
  template:
    metadata:
      labels:
        app: evaluation-service
    spec:
      containers:
      - name: evaluation-service
        image: dalirom123/evaluation-service:latest
        imagePullPolicy: Always
        env:
          - name: JAVA_OPTS
            value: "-Xms64m -Xmx256m"
        resources:
          limits:
            memory: "400Mi"
          requests:
            memory: "250Mi"
        ports:
        - containerPort: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: evaluation-service-service
  namespace: freelink
spec:
  type: ClusterIP
  selector:
    app: evaluation-service
  ports:
    - port: 8090
      targetPort: 8090

