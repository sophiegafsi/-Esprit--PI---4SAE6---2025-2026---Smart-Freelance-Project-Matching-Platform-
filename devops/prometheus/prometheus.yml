global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: spring-boot-actuator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8761
          - host.docker.internal:8088

  - job_name: http-availability
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://host.docker.internal:8761/actuator/health
          - http://host.docker.internal:8088/actuator/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
