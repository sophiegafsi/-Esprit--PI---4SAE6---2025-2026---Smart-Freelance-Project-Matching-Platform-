spring.application.name=gestion-planing

spring.datasource.url=jdbc:mysql://mysql-service.freelink.svc.cluster.local:3306/gestion_planing?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8092

eureka.client.service-url.defaultZone=http://eureka-server.freelink.svc.cluster.local:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak.freelink.svc.cluster.local:8080/realms/freelink-realm

spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false
spring.config.import=optional:configserver:


management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
