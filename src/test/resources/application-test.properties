spring.datasource.url=jdbc:h2:mem:portfolio_test_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.cloud.discovery.enabled=false

portfolio.ai.translation.enabled=false
portfolio.ai.rewrite.correction.enabled=false
portfolio.ai.spring.enabled=false
portfolio.ai.spring.fallback-enabled=true
