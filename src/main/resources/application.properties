spring.application.name=portfolio-service
server.port=8090

spring.datasource.url=jdbc:mysql://localhost:3306/portfolio_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

server.error.include-message=always

# AI translation provider settings
portfolio.ai.translation.enabled=true
portfolio.ai.translation.base-url=https://translate.googleapis.com/translate_a/single
portfolio.ai.translation.timeout-ms=5000

# Rewrite grammar/spelling correction provider settings
portfolio.ai.rewrite.correction.enabled=true
portfolio.ai.rewrite.correction.base-url=https://api.languagetool.org/v2/check
portfolio.ai.rewrite.correction.timeout-ms=5000
