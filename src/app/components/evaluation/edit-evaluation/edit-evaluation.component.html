<div class="edit-evaluation-container">
  <div class="form-card">
    <h2>Modifier l'évaluation</h2>

    <form (ngSubmit)="update()">
      <div class="form-group">
        <label for="projectName">Nom du projet</label>
        <input type="text" id="projectName" class="form-control" [(ngModel)]="evaluation.projectName" name="projectName" required>
      </div>

      <div class="form-group">
        <label for="evaluatorName">Nom de l'évaluateur (client)</label>
        <input type="text" id="evaluatorName" class="form-control" [(ngModel)]="evaluation.evaluatorName" name="evaluatorName" required>
      </div>

      <div class="form-group">
        <label for="evaluatedUserName">Nom de l'évalué (freelancer)</label>
        <input type="text" id="evaluatedUserName" class="form-control" [(ngModel)]="evaluation.evaluatedUserName" name="evaluatedUserName" required>
      </div>

      <div class="form-group">
        <label for="score">Note (1-5)</label>
        <input type="number" id="score" class="form-control" min="1" max="5" [(ngModel)]="evaluation.score" name="score" required>
      </div>

      <div class="form-group">
        <label for="comment">Commentaire</label>
        <textarea id="comment" class="form-control" [(ngModel)]="evaluation.comment" name="comment" rows="4"></textarea>
      </div>

      <div class="form-group">
        <label for="typeEvaluation">Type d'évaluation</label>
        <select id="typeEvaluation" class="form-control" [(ngModel)]="evaluation.typeEvaluation" name="typeEvaluation">
          <option *ngFor="let type of evaluationTypes" [value]="type">{{ type }}</option>
        </select>
      </div>

      <div class="form-check">
        <input type="checkbox" id="anonymous" class="form-check-input" [(ngModel)]="evaluation.anonymous" name="anonymous">
        <label for="anonymous" class="form-check-label">Anonyme</label>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Mettre à jour</button>
        <button type="button" class="btn btn-secondary" routerLink="/evaluations">Annuler</button>
      </div>
    </form>
  </div>
</div>
