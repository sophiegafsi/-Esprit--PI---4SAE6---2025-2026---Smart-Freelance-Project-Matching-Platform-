<div class="historique-container">
  <div class="content-wrapper">
    <h2>Historique des évaluations</h2>

    <div class="filters-row">
      <div class="search-box">
        <input type="text" placeholder="Rechercher par Freelancer " [(ngModel)]="searchTerm" (input)="applyFilter()">
      </div>
      <div class="filter-note">
        <select [(ngModel)]="filterNote" (change)="applyFilter()">
          <option [ngValue]="null">Toutes les notes</option>
          <option *ngFor="let n of [1,2,3,4,5]" [value]="n">{{ n }} étoile(s)</option>
        </select>
      </div>
      <div class="average-score">
        Score moyen : <strong>{{ getAverageScore() }}</strong>
      </div>
    </div>

    <div class="table-responsive">
      <table class="styled-table">
        <thead>
          <tr>
            <th>Client</th>
            <th>Projet</th>
            <th>Freelancer</th>
            <th>Note</th>
            <th>Commentaire</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let e of filteredEvaluations">
            <td>{{ e.evaluatorName || 'N/A' }}</td>
            <td>{{ e.projectName || 'N/A' }}</td>
            <td>{{ e.evaluatedUserName || 'N/A' }}</td>
            <td class="note">{{ e.score }}</td>
            <td>{{ e.comment || '-' }}</td>
            <td>{{ e.date | date:'short' }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div *ngIf="filteredEvaluations.length === 0" class="no-data">
      Aucune évaluation trouvée.
    </div>
  </div>
</div>
