<div class="container mt-3">
  <h2>Modifier un avis</h2>
  <form (ngSubmit)="updateReview()">
    <div class="mb-3">
      <label>Commentaire</label>
      <textarea class="form-control" [(ngModel)]="review.comment" name="comment"></textarea>
    </div>
    <div class="mb-3">
      <label>Score</label>
      <input type="number" class="form-control" [(ngModel)]="review.score" name="score" min="0" max="5">
    </div>
    <button class="btn btn-success" type="submit">Modifier</button>
    <button class="btn btn-secondary" type="button" (click)="router.navigate(['/reviews'])">Annuler</button>
  </form>
</div>
