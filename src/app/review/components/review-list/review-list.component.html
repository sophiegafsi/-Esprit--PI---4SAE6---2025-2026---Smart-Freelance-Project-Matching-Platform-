<div class="container mt-3">
  <h2>Liste des avis</h2>
  <button class="btn btn-success mb-3" (click)="goToAdd()">Ajouter un avis</button>

  <table class="table table-hover table-bordered text-center align-middle">
    <thead class="table-dark">
      <tr>
        <th>Commentaire</th>
        <th>Score</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of reviews">
        <td>{{ r.comment }}</td>
        <td>{{ r.score }}</td>
        <td>
          <button class="btn btn-primary btn-sm me-2" (click)="goToEdit(r.idR!)">Modifier</button>
          <button class="btn btn-danger btn-sm" (click)="deleteReview(r.idR!)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
