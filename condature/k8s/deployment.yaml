apiVersion: apps/v1
kind: Deployment
metadata:
  name: condature
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: condature
  template:
    metadata:
      labels:
        app: condature
    spec:
      containers:
      - name: condature
        image: condature:latest
        ports:
        - containerPort: 8083
