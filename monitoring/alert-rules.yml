groups:
  - name: reservation-service-alerts
    rules:

      - alert: ServiceDown
        expr: up{job="reservation-service"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Reservation Service is DOWN"
          description: "The reservation microservice has been unreachable for more than 30 seconds."

      - alert: HighMemoryUsage
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High Heap Memory Usage"
          description: "JVM heap usage is above 85% for 1 minute."

      - alert: HighCpuLoad
        expr: process_cpu_usage > 0.80
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High CPU Usage"
          description: "CPU usage is above 80% for 1 minute."

      - alert: TooManyHttpErrors
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 5xx Error Rate"
          description: "More than 10% of requests are returning 5xx errors."
