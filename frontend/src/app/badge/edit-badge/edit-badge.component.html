<section class="page">
  <section class="page-header">
    <div>
      <div class="eyebrow">Badge</div>
      <h1>Edit Badge</h1>
      <p class="muted">Badge CRUD + business settings (automatic assignment).</p>
    </div>
    <div class="toolbar">
      <a class="ghost" href="#badges">Back to badges</a>
      <button class="secondary" type="button" (click)="loadBadges()">Refresh</button>
    </div>
  </section>

  <section class="form-card">
    <div class="form-grid">
      <div class="field full">
        <label for="badgeSelect">Badge to edit</label>
        <select
          id="badgeSelect"
          [disabled]="isLoading || !badges.length"
          [(ngModel)]="selectedBadgeId"
          (ngModelChange)="selectBadge($event)">
          <option [ngValue]="0">-- Select --</option>
          <option *ngFor="let badge of badges" [ngValue]="badge.id">
            #{{ badge.id }} - {{ badge.name }}
          </option>
        </select>
      </div>

      <div class="field">
        <label for="name">Name</label>
        <input id="name" [(ngModel)]="formModel.name" [disabled]="!selectedBadgeId" />
      </div>

      <div class="field">
        <label for="icon">Icon</label>
        <input id="icon" [(ngModel)]="formModel.icon" [disabled]="!selectedBadgeId" />
      </div>

      <div class="field full">
        <label for="description">Description</label>
        <textarea id="description" [(ngModel)]="formModel.description" [disabled]="!selectedBadgeId"></textarea>
      </div>

      <div class="field">
        <label for="category">Category</label>
        <select id="category" [(ngModel)]="formModel.category" [disabled]="!selectedBadgeId">
          <option value="SCORE">Score</option>
          <option value="POINTS">Points</option>
          <option value="LEVEL">Level</option>
          <option value="CUSTOM">Custom</option>
        </select>
      </div>

      <div class="field">
        <label for="conditionType">Condition type</label>
        <select
          id="conditionType"
          [(ngModel)]="formModel.conditionType"
          [disabled]="!selectedBadgeId || !formModel.autoAssignable">
          <option value="AVERAGE_SCORE">Average score</option>
          <option value="POINTS">Points</option>
          <option value="LEVEL">Level</option>
        </select>
      </div>

      <div class="field">
        <label for="conditionValue">Threshold value</label>
        <input
          id="conditionValue"
          type="number"
          min="0"
          step="0.1"
          [(ngModel)]="formModel.conditionValue"
          [disabled]="!selectedBadgeId || !formModel.autoAssignable" />
      </div>

      <div class="field">
        <label for="pointsReward">Bonus points</label>
        <input id="pointsReward" type="number" min="0" [(ngModel)]="formModel.pointsReward" [disabled]="!selectedBadgeId" />
      </div>

      <label class="toggle-field">
        <input type="checkbox" [(ngModel)]="formModel.autoAssignable" [disabled]="!selectedBadgeId" />
        <span>Automatic assignment</span>
      </label>

      <label class="toggle-field">
        <input type="checkbox" [(ngModel)]="formModel.certificateEligible" [disabled]="!selectedBadgeId" />
        <span>PDF certificate</span>
      </label>

      <label class="toggle-field">
        <input type="checkbox" [(ngModel)]="formModel.isActive" [disabled]="!selectedBadgeId" />
        <span>Badge active</span>
      </label>

      <div class="form-actions full">
        <button class="primary" type="button" (click)="save()" [disabled]="!selectedBadgeId || isSaving">
          {{ isSaving ? 'Saving...' : 'Save changes' }}
        </button>
        <button class="ghost" type="button" (click)="reset()" [disabled]="!selectedBadgeId || isSaving">
          Reset
        </button>
      </div>
    </div>
  </section>

  <section *ngIf="feedbackType === 'success'" class="alert" style="margin-top: 16px">
    {{ feedbackMessage }}
  </section>
  <section *ngIf="feedbackType === 'error'" class="alert error" style="margin-top: 16px">
    {{ feedbackMessage }}
  </section>
</section>
