version: '3.8'

services:
  keycloak:
    image: keycloak-yesterday
    container_name: keycloak-yesterday
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    command: start-dev
    depends_on:
      - mailhog

  mailhog:
    image: mailhog-yesterday
    container_name: mailhog-yesterday
    ports:
      - "1025:1025"
      - "8025:8025"
