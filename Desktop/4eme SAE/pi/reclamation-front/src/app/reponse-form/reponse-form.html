<div class="response-form-card">
  <h3>Add a Response</h3>

  <form [formGroup]="form" (ngSubmit)="submit()" class="form">

    <div class="field">
      <label>User</label>
      <select formControlName="utilisateur">
        <option *ngFor="let u of utilisateurs" [value]="u">{{ u }}</option>
      </select>
    </div>

    <div class="field">
      <label>Message</label>
      <textarea
        rows="4"
        formControlName="message"
        placeholder="Write a response..."
        (input)="analyzeMessageSentiment()"
      ></textarea>

      <div class="error-hint" *ngIf="f['message'].touched && f['message'].invalid">
        Message is required and must contain at least 3 characters.
      </div>
    </div>

    <div *ngIf="sentimentResult"
         class="sentiment-box"
         [ngClass]="sentimentResult.toLowerCase()">

      <strong>Sentiment:</strong> {{ sentimentResult }}
      <p>{{ sentimentReason }}</p>
    </div>

    <div *ngIf="moderationError" class="moderation-warning">
      <p>{{ moderationError }}</p>

      <div *ngIf="suggestedMessage" class="suggestion-box">
        <strong>Professional suggestion:</strong>
        <p>{{ suggestedMessage }}</p>

        <button type="button" class="suggestion-btn" (click)="useSuggestion()">
          Use this suggestion
        </button>
      </div>
    </div>

    <div class="actions">
      <button type="submit" class="btn primary" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Sending...' : 'Add Response' }}
      </button>
    </div>

  </form>
</div>
