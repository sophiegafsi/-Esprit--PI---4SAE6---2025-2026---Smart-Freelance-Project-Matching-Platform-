spring.application.name=projet-service
# Identity
server.port=8086

# Database
spring.datasource.url=jdbc:mysql://mysql-service.freelink.svc.cluster.local:3306/projet_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Eureka
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://eureka-server.freelink.svc.cluster.local:8761/eureka/
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

# Microservice config
spring.cloud.config.enabled=false



management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
