<div class="container" style="margin-top: 2rem;">
    <h2 style="margin-bottom: 2rem;">My Posted Projects</h2>

    <div *ngIf="loading" style="text-align: center; color: var(--muted);">Loading...</div>

    <div *ngIf="errorMessage"
        style="background: rgba(255, 0, 0, 0.2); color: #ffcccc; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
        {{ errorMessage }}
    </div>

    <div *ngIf="!loading && projects.length === 0" style="text-align: center; color: var(--muted); padding: 2rem;">
        <p>You haven't posted any projects yet.</p>
        <a href="#" class="btn primary">Post a Job</a> <!-- Link to job posting if available -->
    </div>

    <div class="projects-grid" style="display: grid; gap: 1.5rem;">
        <div *ngFor="let project of projects"
            style="background: var(--card-bg); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 1.5rem; display: flex; justify-content: space-between; align-items: center;">

            <div>
                <h3>{{ project.title }}</h3>
                <p style="color: var(--muted); margin: 0 0 0.5rem 0;">{{ project.description | slice:0:100 }}...</p>
                <span class="salary" style="font-size: 0.9rem; color: var(--primary);">Budget: ${{ project.budget
                    }}</span>
            </div>

            <div>
                <a [routerLink]="['/project-applications', project.id]" class="btn primary small">
                    View Candidates
                </a>
            </div>
        </div>
    </div>
</div>
