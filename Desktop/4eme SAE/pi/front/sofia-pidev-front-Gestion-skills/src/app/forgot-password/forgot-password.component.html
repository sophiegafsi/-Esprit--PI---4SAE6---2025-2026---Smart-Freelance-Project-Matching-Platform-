<main class="page">
    <div class="container center-wrap">

        <div class="card forgot-card">

            <div class="head">
                <h1>Forgot your password? 🔐</h1>
                <p>Enter your email address and we’ll send you a link to reset your password.</p>
            </div>

            <form class="form" (ngSubmit)="onSubmit()">

                <div class="field">
                    <label for="email">Email address</label>
                    <input id="email" type="email" placeholder="you@example.com" [(ngModel)]="email" name="email"
                        required />
                </div>

                <button class="btn orange full" type="submit">Send reset link</button>

                <div class="divider"><span>or</span></div>

                <a routerLink="/login" class="btn ghost full">Back to login</a>

                <p class="bottom-text">
                    Don’t have an account?
                    <a routerLink="/signup" class="link">Create one</a>
                </p>

            </form>
        </div>

    </div>
</main>
