<main class="page">
    <div class="container center-wrap">

        <div class="signup-card">

            <div class="signup-head">
                <h1>Create your account ✨</h1>
                <p>Join FreeLink and start collaborating with top talents.</p>
            </div>

            <form class="signup-form" (ngSubmit)="onSignup()">

                <div class="two">
                    <div class="field">
                        <label for="first">First name</label>
                        <input id="first" type="text" placeholder="Soufia" [(ngModel)]="user.firstName" name="firstName"
                            required />
                    </div>

                    <div class="field">
                        <label for="last">Last name</label>
                        <input id="last" type="text" placeholder="Gafsi" [(ngModel)]="user.lastName" name="lastName"
                            required />
                    </div>
                </div>

                <div class="field">
                    <label for="birthdate">Birth date</label>
                    <input id="birthdate" type="date" [(ngModel)]="user.birthDate" name="birthDate" required />
                </div>


                <div class="field">
                    <label for="email">Email address</label>
                    <input id="email" type="email" placeholder="you@example.com" [(ngModel)]="user.email" name="email"
                        required />
                </div>

                <div class="two">
                    <div class="field">
                        <label for="pass">Password</label>
                        <input id="pass" type="password" placeholder="••••••••" [(ngModel)]="user.password"
                            name="password" required />
                    </div>

                    <div class="field">
                        <label for="confirm">Confirm password</label>
                        <input id="confirm" type="password" placeholder="••••••••" [(ngModel)]="user.confirmPassword"
                            name="confirmPassword" required />
                    </div>
                </div>

                <div class="field">
                    <label for="country">Country</label>
                    <select id="country" [(ngModel)]="user.country" name="country">
                        <option>Tunisia</option>
                        <option>France</option>
                        <option>Algeria</option>
                        <option>Morocco</option>
                        <option>Other</option>
                    </select>
                </div>

                <label class="terms">
                    <input type="checkbox" required />
                    <span>
                        I agree to the <a class="link" href="#">Terms</a> and
                        <a class="link" href="#">Privacy Policy</a>.
                    </span>
                </label>

                <button class="btn orange full" type="submit">Create account</button>

                <div class="divider"><span>or</span></div>

                <button class="btn ghost full" type="button">Continue with Google</button>

                <p class="bottom-text">
                    Already have an account?
                    <a routerLink="/login" class="link">Login</a>
                </p>

            </form>
        </div>

    </div>
</main>
