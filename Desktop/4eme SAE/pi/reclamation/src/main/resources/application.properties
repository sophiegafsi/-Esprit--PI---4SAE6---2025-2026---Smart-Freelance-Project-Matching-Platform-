spring.application.name=reclamation
# Identity
server.port=8085
spring.datasource.url=jdbc:mysql://mysql-service:3306/reclamationdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Eureka
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

# Microservice config
spring.cloud.config.enabled=false

# Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/freelink-realm
