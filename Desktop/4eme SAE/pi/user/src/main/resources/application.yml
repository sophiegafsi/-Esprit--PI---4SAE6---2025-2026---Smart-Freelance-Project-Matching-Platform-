spring:
  application:
    name: user-service

  cloud:
    discovery:
      enabled: false
    config:
      enabled: false

  datasource:
    url: jdbc:mysql://localhost:3307/freelink-db?createDatabaseIfNotExist=true&useSSL=false
    username: root
    password:
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update




  # OAuth2 Resource Server Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/freelink-realm
      client:
        registration:
          keycloak:
            client-id: user-service
            authorization-grant-type: authorization_code
            scope: openid, profile, email
            redirect-uri: "{baseUrl}/login/oauth2/code/keycloak"
            client-secret: cuyjZO1oj5jHoefWmlGPoerryp8od9KP
        provider:
          keycloak:
            issuer-uri: http://localhost:8080/realms/freelink-realm
            user-name-attribute: preferred_username

server:
  port: 8082

keycloak:
  auth-server-url: http://localhost:8080
  realm: freelink-realm
  resource: user-service
  credentials:
    secret: cuyjZO1oj5jHoefWmlGPoerryp8od9KP

logging:
  level:
    org.springframework.security: DEBUG

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false