# Server
server.port=8088
spring.application.name=reservation-service

# MySQL — uses Docker/K8s service name instead of localhost
spring.datasource.url=jdbc:mysql://mysql-reservation:3306/reservation_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka — uses K8s service name
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# OAuth2 / Keycloak — uses K8s service name
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/freelink-realm

# Actuator — expose health + prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Logging
logging.level.tn.esprit.reservation=INFO
