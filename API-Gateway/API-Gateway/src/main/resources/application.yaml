server:
  port: 8081   # Port de ton API-Gateway
  error:
    whitelabel:
      enabled: false  # désactive la page Whitelabel

spring:
  application:
    name: api-gateway

  cloud:
    discovery:
      enabled: false
    gateway:
      globalcors:
        cors-configurations:
          '[/skills/**]': &corsConfig
            allowedOrigins: ["http://localhost:4200"]
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
            allowedHeaders: ["*"]
            allowCredentials: true
          '[/projet/**]': *corsConfig
          '[/condidature/**]': *corsConfig
          '[/time-tracking/**]': *corsConfig
          '[/portfolio/**]': *corsConfig
          '[/planning/**]': *corsConfig
          '[/user/**]': *corsConfig
          '[/reclamation/**]': *corsConfig
          '[/reservation/**]': *corsConfig
          '[/proofs/**]': *corsConfig
          '[/evaluations/**]': *corsConfig
          '[/review/**]': *corsConfig
          '[/api/user-badges/**]': *corsConfig
          '[/api/rewards/**]': *corsConfig
          '[/api/recompenses/**]': *corsConfig
          '[/api/points/**]': *corsConfig
          '[/api/notifications/**]': *corsConfig
          '[/api/badges/**]': *corsConfig
      routes:
        # Route pour le microservice "Reclamation"
        - id: reclamation-service
          uri: http://localhost:8085
          predicates:
            - Path=/reclamation/**
          filters:
            - StripPrefix=1

        # Route pour le microservice "Utilisateur"
        - id: user-service
          uri: http://localhost:8082       # port du microservice Utilisateur
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1

        # Route pour le microservice "skills"
        - id: skills-service
          uri: http://localhost:8089       # port du microservice skills
          predicates:
            - Path=/skills/**, /proofs/**
        # Route pour le microservice "projet"
        - id: projet-service
          uri: http://localhost:8086       # port du microservice projet
          predicates:
            - Path=/projet/**
          filters:
            - StripPrefix=1

        # Route pour le microservice "condidature"
        - id: condidature-service
          uri: http://localhost:8083       # port du microservice condidature
          predicates:
            - Path=/condidature/**
          filters:
            - StripPrefix=1

        # Route pour le microservice "time-tracking"
        - id: time-tracking-service
          uri: http://localhost:8087       # port du microservice time-tracking
          predicates:
            - Path=/time-tracking/**
          filters:
            - StripPrefix=1

        # Route pour le microservice "reservation"
        - id: reservation-service
          uri: http://localhost:8088
          predicates:
            - Path=/reservation/**
          filters:
            - StripPrefix=1

        # Route pour le microservice "portfolio"
        - id: portfolio-service
          uri: http://localhost:8090
          predicates:
            - Path=/portfolio/**
          filters:
            - StripPrefix=1

        # Route pour le microservice "gestion-planing"
        - id: planning-service
          uri: http://localhost:8092
          predicates:
            - Path=/planning/**
          filters:
            - StripPrefix=1
            
        # Route pour le microservice "evaluation"
        - id: evaluation-service
          uri: http://localhost:8095
          predicates:
            - Path=/evaluations/**, /review/**

        # Route pour le microservice "recompense"
        - id: recompense-service
          uri: http://localhost:8094
          predicates:
            - Path=/api/user-badges/**, /api/rewards/**, /api/recompenses/**, /api/points/**, /api/notifications/**, /api/badges/**

#     discovery:
#       locator:
#         enabled: true   # active la découverte automatique via Eureka

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/

