server:
  port: 8081   # Port de ton API-Gateway
  error:
    whitelabel:
      enabled: false  # désactive la page Whitelabel

spring:
  application:
    name: api-gateway

  cloud:
    discovery:
      enabled: false
    gateway:
      globalcors:
        cors-configurations:
          '[/skills/**]': &corsConfig
            allowedOrigins: ["http://localhost:4200", "http://20.240.47.244:30080"]
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
            allowedHeaders: ["*"]
            allowCredentials: true
          '[/projet/**]': *corsConfig
          '[/condidature/**]': *corsConfig
          '[/time-tracking/**]': *corsConfig
      routes:
        # Route pour le microservice "Evaluation"
        - id: evaluation-service
          uri: http://reclamation:8085
          predicates:
            - Path=/evaluation/**
          filters:
            - StripPrefix=1

        # Route pour le microservice "Utilisateur"
        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1

        # Route pour le microservice "skills"
        - id: skills-service
          uri: http://skills-service:8084
          predicates:
            - Path=/skills/**
          filters:
            - StripPrefix=1

        # Route pour le microservice "projet"
        - id: projet-service
          uri: http://evaluation-service:8086
          predicates:
            - Path=/projet/**
          filters:
            - StripPrefix=1

        # Route pour le microservice "condidature"
        - id: condidature-service
          uri: http://condature:8082
          predicates:
            - Path=/condidature/**
          filters:
            - StripPrefix=1

        # Route pour le microservice "time-tracking"
        - id: time-tracking-service
          uri: http://time-tracking-service:8088
          predicates:
            - Path=/time-tracking/**
          filters:
            - StripPrefix=1

        # Route pour le microservice "reservation"
        - id: reservation-service
          uri: http://reservation-service:8083
          predicates:
            - Path=/reservation/**
          filters:
            - StripPrefix=1

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
