<div class="form-page">
  <div class="container py-4">
    <nav class="mb-4">
      <a routerLink="/planning" class="text-muted text-decoration-none">
        <i class="fas fa-arrow-left me-2"></i> Back to All Plannings
      </a>
    </nav>

    <div class="form-wrapper">
      <div class="form-card">
        <div class="title-block">
          <p class="mini-label">✏️ Update your schedule</p>
          <h1>Edit Planning</h1>
          <p class="subtitle">
            Modify the information of your planning and keep your organization up to date.
          </p>
        </div>

        <form #editForm="ngForm" (ngSubmit)="editForm.form.valid && updatePlanning()" novalidate>
          <div class="form-group">
            <label>📝 Title <span class="text-danger">*</span></label>
            <input type="text" name="title" [(ngModel)]="planning.title" #title="ngModel" required minlength="3"
              maxlength="100" placeholder="Enter planning title (min 3 chars)"
              [class.is-invalid]="title.invalid && (title.dirty || title.touched)" />
          </div>

          <div class="form-group">
            <label>📄 Description <span class="text-danger">*</span></label>
            <textarea name="description" [(ngModel)]="planning.description" rows="5" #desc="ngModel" required
              minlength="5" maxlength="500" placeholder="Enter planning description (min 5 chars)"
              [class.is-invalid]="desc.invalid && (desc.dirty || desc.touched)"></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>📅 Start Date <span class="text-danger">*</span></label>
              <input type="date" name="startDate" [(ngModel)]="planning.startDate" #start="ngModel" required
                [class.is-invalid]="start.invalid && (start.dirty || start.touched)" />
            </div>

            <div class="form-group">
              <label>⏳ End Date <span class="text-danger">*</span></label>
              <input type="date" name="endDate" [(ngModel)]="planning.endDate" #end="ngModel" required
                [class.is-invalid]="end.invalid && (end.dirty || end.touched)" />
            </div>
          </div>

          <div class="form-group">
            <label>🚦 Status <span class="text-danger">*</span></label>
            <div class="select-wrapper">
              <select name="status" class="form-select" [(ngModel)]="planning.status" required>
                <option value="ACTIVE">ACTIVE</option>
                <option value="COMPLETED">COMPLETED</option>
                <option value="CANCELLED">CANCELLED</option>
              </select>
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="save-btn" [disabled]="editForm.form.invalid">💾 Update Planning</button>
            <a routerLink="/planning" class="cancel-btn">✖ Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
