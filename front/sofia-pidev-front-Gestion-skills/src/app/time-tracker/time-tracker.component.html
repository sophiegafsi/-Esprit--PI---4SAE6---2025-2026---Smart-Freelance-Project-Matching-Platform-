<div class="floating-tracker" *ngIf="isVisible" style="position: fixed; bottom: 40px; right: 40px; z-index: 10000; width: 340px; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); 
            border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.7); 
            box-shadow: 0 20px 50px rgba(12, 39, 66, 0.15), 0 0 0 1px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);">

    <!-- Header -->
    <div
        style="background: rgba(248, 250, 252, 0.8); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.04);">
        <div style="display: flex; align-items: center; gap: 8px;">
            <div *ngIf="isTracking"
                style="width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981;">
            </div>
            <div *ngIf="!isTracking" style="width: 8px; height: 8px; background: #cbd5e1; border-radius: 50%;"></div>
            <h6
                style="margin: 0; font-weight: 700; font-size: 0.85rem; color: #334155; text-transform: uppercase; letter-spacing: 0.5px;">
                {{ isTracking ? 'Session Active' : 'Session Paused' }}
            </h6>
        </div>
        <button (click)="closeTracker()"
            style="background: none; border: none; color: #94a3b8; font-size: 1.5rem; line-height: 1; cursor: pointer; padding: 0 5px; transition: color 0.2s;"
            onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#94a3b8'">
            &times;
        </button>
    </div>

    <!-- Body -->
    <div style="padding: 30px 20px 25px; text-align: center;">

        <div
            style="display: inline-block; background: #f1f5f9; padding: 15px 30px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #e2e8f0; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">
            <h2
                style="font-family: 'SF Mono', Consolas, monospace; font-weight: 800; font-size: 2.5rem; margin: 0; color: #0f172a; letter-spacing: 2px;">
                {{ formattedTime }}
            </h2>
        </div>

        <!-- Controls -->
        <div style="display: flex; gap: 12px; justify-content: center;">
            <button *ngIf="!isTracking" (click)="startTimer()"
                style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; border-radius: 10px; padding: 12px 0; font-weight: 600; font-size: 0.95rem; cursor: pointer; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); transition: transform 0.2s, box-shadow 0.2s;"
                onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 15px rgba(16,185,129,0.4)';"
                onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(16,185,129,0.3)';">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                Commence Session
            </button>
            <button *ngIf="isTracking" (click)="stopTimer()"
                style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: white; border: none; border-radius: 10px; padding: 12px 0; font-weight: 600; font-size: 0.95rem; cursor: pointer; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); transition: transform 0.2s, box-shadow 0.2s;"
                onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 15px rgba(239,68,68,0.4)';"
                onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 12px rgba(239,68,68,0.3)';">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                </svg>
                Stop & Log
            </button>
        </div>

        <!-- Footer Meta -->
        <div style="margin-top: 20px; text-align: center;">
            <p *ngIf="isTracking"
                style="margin: 0; font-size: 0.75rem; color: #64748b; display: flex; align-items: center; justify-content: center; gap: 5px;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                </svg>
                Syncing: <span style="font-family: monospace;">{{ currentSessionId?.substring(0,8) }}</span>
            </p>
            <p *ngIf="!isTracking" style="margin: 0; font-size: 0.75rem; color: #94a3b8;">
                Ready to track your hours securely.
            </p>
        </div>

    </div>
</div>
