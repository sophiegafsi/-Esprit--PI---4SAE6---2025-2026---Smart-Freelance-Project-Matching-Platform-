<div class="page">
  <div class="header">
    <h2>🏆 Top Skills Scoreboard</h2>
    <div class="actions">
      <button class="btn ghost" routerLink="/portfolio">Portfolio</button>
      <button class="btn ghost" (click)="back()">Back</button>
    </div>
  </div>

  <div *ngIf="loading">Loading...</div>
  <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <div class="grid" *ngIf="!loading">
    <div class="card" *ngFor="let s of scores; let i = index">
      <div class="rank">#{{ i + 1 }}</div>
      <div class="name">{{ s.name }}</div>
      <div class="score">Score: {{ s.score }}</div>
    </div>
  </div>
</div>
