apiVersion: apps/v1
kind: Deployment
metadata:
  name: porjectservice
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: porjectservice
  template:
    metadata:
      labels:
        app: porjectservice
    spec:
      containers:
      - name: porjectservice
        image: porjectservice:latest
        ports:
        - containerPort: 8086
