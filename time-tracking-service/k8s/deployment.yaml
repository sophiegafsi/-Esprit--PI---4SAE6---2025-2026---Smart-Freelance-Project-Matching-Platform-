apiVersion: apps/v1
kind: Deployment
metadata:
  name: time-tracking-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: time-tracking-service
  template:
    metadata:
      labels:
        app: time-tracking-service
    spec:
      containers:
      - name: time-tracking-service
        image: time-tracking-service:latest
        ports:
        - containerPort: 8087
